<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Deposit System - Panel Kontrol</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .transition-all { transition: all 0.3s ease; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Komponen Icon Sederhana untuk Lucide
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            // State Auth & Navigasi
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [role, setRole] = useState('user'); // 'user' atau 'admin'
            const [activeTab, setActiveTab] = useState('dashboard');
            const [authView, setAuthView] = useState('login');

            // Data Simulasi
            const [rate, setRate] = useState(5000);
            const [saldo, setSaldo] = useState(150000);
            const [deposits, setDeposits] = useState([
                { id: 1, email: 'user123@gmail.com', pass: 'pass123', status: 'pending', date: '08/04/2024 14:00' },
                { id: 2, email: 'gmailoke@gmail.com', pass: 'rahasia', status: 'acc', date: '07/04/2024 10:30' }
            ]);

            const [missions, setMissions] = useState([
                { id: 1, title: 'Misi Gmail Tua (2018)', rules: 'Wajib verif nomor, umur 5th+', target: 50, status: 'aktif' },
                { id: 2, title: 'Misi Akun Fresh Indo', rules: 'IP Indonesia, verif nomor aktif', target: 100, status: 'aktif' }
            ]);

            // Handlers
            const handleLogin = (e) => {
                e.preventDefault();
                setIsLoggedIn(true);
                setActiveTab(role === 'admin' ? 'admin-overview' : 'dashboard');
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setActiveTab('dashboard');
            };

            const handleDeposit = (e) => {
                e.preventDefault();
                const text = e.target.batch.value;
                const lines = text.split('\n').filter(l => l.trim() !== '');
                const newItems = lines.map((line, i) => {
                    const [email, pass] = line.split('|');
                    return { id: Date.now() + i, email, pass: pass || 'No Pass', status: 'pending', date: new Date().toLocaleString() };
                });
                setDeposits([...newItems, ...deposits]);
                e.target.reset();
                alert(`Berhasil setor ${newItems.length} akun!`);
            };

            const handleAdminAcc = (id) => {
                setDeposits(prev => prev.map(d => {
                    if (d.id === id && d.status === 'pending') {
                        setSaldo(s => s + rate);
                        return { ...d, status: 'acc' };
                    }
                    return d;
                }));
            };

            const handleAdminReject = (id) => {
                setDeposits(prev => prev.map(d => d.id === id ? { ...d, status: 'tolak' } : d));
            };

            // View Login / Register
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-500 to-purple-600">
                        <div className="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl flex overflow-hidden">
                            <div className="hidden md:flex md:w-1/2 bg-indigo-600 p-12 text-white flex-col justify-between">
                                <div>
                                    <div className="flex items-center space-x-3 mb-10 font-black text-2xl tracking-tighter">
                                        <div className="bg-white/20 p-2 rounded-xl"><LucideIcon name="shield-check" size={32} /></div>
                                        <span>G-DEPOSIT</span>
                                    </div>
                                    <h2 className="text-3xl font-bold leading-tight">Ubah Akun Gmail Menjadi Saldo Nyata.</h2>
                                    <p className="mt-4 text-indigo-100 italic">Sistem otomatis, validasi cepat, dan WD langsung cair.</p>
                                </div>
                                <div className="text-xs text-indigo-300">© 2024 G-Deposit System Official</div>
                            </div>
                            <div className="w-full md:w-1/2 p-10 md:p-16">
                                <h3 className="text-2xl font-black mb-2">{authView === 'login' ? 'Masuk Sesi' : 'Daftar Baru'}</h3>
                                <p className="text-slate-400 text-sm mb-8">Silakan isi formulir di bawah ini.</p>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Pilih Role</label>
                                        <select value={role} onChange={(e) => setRole(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold text-sm text-indigo-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                                            <option value="user">Sebagai User (Penyetor)</option>
                                            <option value="admin">Sebagai Admin (Owner)</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username</label>
                                        <input type="text" placeholder="Masukkan username" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none" required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                                        <input type="password" placeholder="••••••••" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none" required />
                                    </div>
                                    <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center space-x-2">
                                        <span>{authView === 'login' ? 'Login Sekarang' : 'Buat Akun'}</span>
                                        <LucideIcon name="arrow-right" size={18} />
                                    </button>
                                </form>
                                <p className="mt-8 text-center text-sm text-slate-400">
                                    {authView === 'login' ? 'Belum punya akun?' : 'Sudah punya akun?'}
                                    <button onClick={() => setAuthView(authView === 'login' ? 'register' : 'login')} className="ml-2 font-black text-indigo-600 uppercase text-xs">Daftar</button>
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // Dashboard View
            return (
                <div className="min-h-screen flex">
                    {/* Sidebar */}
                    <aside className="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col fixed h-full z-20">
                        <div className="p-8">
                            <div className="flex items-center space-x-3 mb-12 font-black text-xl tracking-tighter text-indigo-600">
                                <LucideIcon name="shield-check" size={28} />
                                <span>G-DEPOSIT</span>
                            </div>
                            <nav className="space-y-2">
                                <p className="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Navigasi</p>
                                {role === 'user' ? (
                                    <>
                                        <SidebarLink active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout-dashboard" label="Beranda" />
                                        <SidebarLink active={activeTab === 'setor'} onClick={() => setActiveTab('setor')} icon="send" label="Setor Gmail" />
                                        <SidebarLink active={activeTab === 'misi'} onClick={() => setActiveTab('misi')} icon="clipboard-list" label="Misi Aktif" />
                                        <SidebarLink active={activeTab === 'wd'} onClick={() => setActiveTab('wd')} icon="wallet" label="Tarik Saldo" />
                                    </>
                                ) : (
                                    <>
                                        <SidebarLink active={activeTab === 'admin-overview'} onClick={() => setActiveTab('admin-overview')} icon="layout-dashboard" label="Overview" />
                                        <SidebarLink active={activeTab === 'admin-validasi'} onClick={() => setActiveTab('admin-validasi')} icon="check-circle" label="Validasi Akun" />
                                        <SidebarLink active={activeTab === 'admin-rate'} onClick={() => setActiveTab('admin-rate')} icon="settings" label="Rate Harga" />
                                    </>
                                )}
                            </nav>
                        </div>
                        <div className="mt-auto p-8 border-t border-slate-50">
                            <button onClick={handleLogout} className="flex items-center space-x-3 text-red-500 font-bold p-3 hover:bg-red-50 rounded-xl w-full transition-all">
                                <LucideIcon name="log-out" size={20} />
                                <span className="text-sm">Logout</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 lg:ml-72 p-6 md:p-10 animate-in">
                        <header className="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
                            <div>
                                <h1 className="text-2xl font-black text-slate-800">Halo, {role === 'admin' ? 'Admin' : 'Penyetor'}</h1>
                                <p className="text-slate-400 text-sm">Dashboard {role === 'admin' ? 'Pemantauan' : 'Pekerja'}.</p>
                            </div>
                            <div className="bg-white p-4 pr-10 rounded-3xl shadow-sm border border-slate-100 flex items-center space-x-4">
                                <div className="bg-green-100 text-green-600 p-3 rounded-2xl"><LucideIcon name="wallet" size={24} /></div>
                                <div>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Saldo Tersedia</p>
                                    <p className="text-xl font-black text-indigo-600">Rp {saldo.toLocaleString()}</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 gap-8">
                            {/* USER: DASHBOARD */}
                            {activeTab === 'dashboard' && role === 'user' && (
                                <div className="space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <StatCard label="Pending" value={deposits.filter(d => d.status === 'pending').length} icon="clock" color="text-amber-500" />
                                        <StatCard label="ACC" value={deposits.filter(d => d.status === 'acc').length} icon="check-circle" color="text-green-500" />
                                        <StatCard label="Tolak" value={deposits.filter(d => d.status === 'tolak').length} icon="x-circle" color="text-red-500" />
                                    </div>
                                    <div className="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                                        <div className="p-8 border-b border-slate-50 flex justify-between items-center">
                                            <h3 className="font-bold">Setoran Terakhir</h3>
                                            <button onClick={() => setActiveTab('setor')} className="text-xs font-bold text-indigo-600 uppercase">Setor Lagi</button>
                                        </div>
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">Gmail</th>
                                                    <th className="px-8 py-5">Status</th>
                                                    <th className="px-8 py-5">Waktu</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {deposits.map(d => (
                                                    <tr key={d.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="px-8 py-5">
                                                            <p className="font-bold text-sm">{d.email}</p>
                                                            <p className="text-[10px] text-slate-300 font-mono">pw: {d.pass}</p>
                                                        </td>
                                                        <td className="px-8 py-5">
                                                            <span className={`text-[10px] font-bold px-3 py-1 rounded-full uppercase ${d.status === 'acc' ? 'bg-green-100 text-green-600' : d.status === 'pending' ? 'bg-amber-100 text-amber-600' : 'bg-red-100 text-red-600'}`}>
                                                                {d.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-8 py-5 text-xs text-slate-400">{d.date}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* USER: SETOR */}
                            {activeTab === 'setor' && (
                                <div className="max-w-2xl mx-auto w-full bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="text-xl font-bold mb-2">Setor Gmail Massal</h3>
                                    <p className="text-sm text-slate-400 mb-8">Gunakan format <span className="font-mono font-bold text-indigo-600">email|password</span> per baris.</p>
                                    <form onSubmit={handleDeposit} className="space-y-6">
                                        <textarea name="batch" rows="8" placeholder="user1@gmail.com|pass123&#10;user2@gmail.com|pass456" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-indigo-500 font-mono text-sm transition-all"></textarea>
                                        <div className="bg-indigo-50 p-4 rounded-2xl flex items-center space-x-4 border border-indigo-100">
                                            <LucideIcon name="trending-up" className="text-indigo-600" />
                                            <div>
                                                <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Rate Per Gmail</p>
                                                <p className="text-lg font-black text-indigo-700">Rp {rate.toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <button className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Kirim Setoran</button>
                                    </form>
                                </div>
                            )}

                            {/* ADMIN: VALIDASI */}
                            {activeTab === 'admin-validasi' && role === 'admin' && (
                                <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
                                    <div className="p-8 border-b border-slate-50 flex justify-between items-center">
                                        <h3 className="text-xl font-bold">Antrian Validasi Gmail</h3>
                                        <span className="bg-amber-100 text-amber-700 text-xs font-bold px-4 py-1 rounded-full uppercase">{deposits.filter(d => d.status === 'pending').length} Menunggu</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">Detail Akun</th>
                                                    <th className="px-8 py-5">Waktu</th>
                                                    <th className="px-8 py-5 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {deposits.map(d => (
                                                    <tr key={d.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="px-8 py-5 font-mono text-sm">
                                                            <span className="font-bold text-slate-700">{d.email}</span>
                                                            <span className="mx-2 text-slate-200">|</span>
                                                            <span className="text-indigo-400">{d.pass}</span>
                                                        </td>
                                                        <td className="px-8 py-5 text-xs text-slate-400">{d.date}</td>
                                                        <td className="px-8 py-5">
                                                            {d.status === 'pending' ? (
                                                                <div className="flex justify-center space-x-2">
                                                                    <button onClick={() => handleAdminAcc(d.id)} className="bg-green-500 text-white px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-green-600 transition-all">ACC</button>
                                                                    <button onClick={() => handleAdminReject(d.id)} className="bg-red-500 text-white px-4 py-1.5 rounded-xl text-xs font-bold hover:bg-red-600 transition-all">Tolak</button>
                                                                </div>
                                                            ) : (
                                                                <div className="text-center">
                                                                    <span className={`text-[10px] font-bold px-3 py-1 rounded-full uppercase ${d.status === 'acc' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>{d.status}</span>
                                                                </div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* ADMIN: RATE */}
                            {activeTab === 'admin-rate' && role === 'admin' && (
                                <div className="max-w-md mx-auto w-full bg-white p-12 rounded-[3rem] shadow-sm border border-slate-100 text-center">
                                    <div className="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 text-indigo-600"><LucideIcon name="settings" size={40} /></div>
                                    <h3 className="text-2xl font-black mb-10">Rate Harga Per Gmail</h3>
                                    <div className="space-y-6 text-left">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Nilai Rate (Rp)</label>
                                            <input type="number" value={rate} onChange={(e) => setRate(parseInt(e.target.value))} className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-3xl font-black outline-none focus:border-indigo-500 transition-all" />
                                        </div>
                                        <button onClick={() => alert('Rate Diperbarui!')} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Simpan Rate</button>
                                    </div>
                                </div>
                            )}

                            {/* MISI VIEW */}
                            {activeTab === 'misi' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {missions.map(m => (
                                        <div key={m.id} className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 relative overflow-hidden group hover:border-indigo-200 transition-all">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="bg-indigo-50 text-indigo-600 p-4 rounded-2xl"><LucideIcon name="clipboard-list" size={32} /></div>
                                                <span className="bg-green-50 text-green-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Aktif</span>
                                            </div>
                                            <h4 className="text-xl font-bold mb-2 group-hover:text-indigo-600 transition-all">{m.title}</h4>
                                            <p className="text-sm text-slate-400 leading-relaxed mb-8">{m.rules}</p>
                                            <div className="flex justify-between items-center pt-8 border-t border-slate-50 text-[10px] font-black text-slate-300 uppercase tracking-widest">
                                                <span className="flex items-center"><LucideIcon name="users" size={14} className="mr-2" /> {m.target} Akun</span>
                                                <span>Deadline: 12/2024</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        // Helper Components
        const SidebarLink = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`w-full flex items-center space-x-3 p-3.5 rounded-2xl transition-all ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-slate-50 hover:text-indigo-600'}`}>
                <LucideIcon name={icon} size={20} />
                <span className="text-sm font-bold">{label}</span>
            </button>
        );

        const StatCard = ({ label, value, icon, color }) => (
            <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between">
                <div>
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                    <h4 className={`text-4xl font-black ${color}`}>{value}</h4>
                </div>
                <LucideIcon name={icon} size={32} className="text-slate-100" />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
